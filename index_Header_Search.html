<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Leaflet KML Layers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 280px;
      max-width: 340px;
      direction: rtl;
      text-align: right;
      line-height: 1.4;
      font-size: 14px;
    }

    .popup-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .popup-body img {
      display: block;
      max-width: 100%;
      max-height: 260px;
      width: auto;
      height: auto;
      object-fit: contain;
      margin: 8px auto;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    .popup-body a {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .popup-image-error {
      color: #b00020;
      font-size: 12px;
      margin-top: 6px;
      text-align: center;
    }

    .leaflet-control-layers {
      font-size: 14px;
    }

    .status-box {
      position: absolute;
      z-index: 1000;
      bottom: 10px;
      left: 10px;
      background: rgba(255,255,255,0.95);
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
      max-width: 260px;
      white-space: pre-line;
    }

    .map-header {
      position: absolute;
      z-index: 1000;
      top: 10px;
      right: 60px;
      left: 60px;
      text-align: center;
      pointer-events: none;
    }

    .map-header-box {
      display: inline-block;
      background: rgba(255,255,255,0.95);
      padding: 8px 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
      font-size: 22px;
      font-weight: bold;
      line-height: 1.3;
    }

    .search-panel {
      position: absolute;
      z-index: 1000;
      top: 70px;
      right: 10px;
      width: 320px;
      background: rgba(255,255,255,0.97);
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
      padding: 10px;
    }

    .search-panel input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #bbb;
      border-radius: 6px;
    }

    .search-results {
      margin-top: 8px;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px solid #ddd;
      padding-top: 6px;
    }

    .search-result-item {
      padding: 6px 4px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .search-result-item:hover {
      background: #f3f3f3;
    }

    .search-result-title {
      font-weight: bold;
      font-size: 14px;
    }

    .search-result-sub {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
      word-break: break-word;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="map-header">
  <div id="mapTitle" class="map-header-box"></div>
</div>

<div class="search-panel">
  <input id="searchInput" type="text" placeholder="חיפוש לפי שם, מזהה, FB, תאריך..." />
  <div id="searchResults" class="search-results"></div>
</div>

<div id="status" class="status-box">טוען שכבות...</div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  // =========================
  // SETTINGS
  // =========================
  const MAP_TITLE = 'מפת היעלים - פרסום שבועי';
  const DEFAULT_ZOOM_ON_SEARCH = 15;
  const MAX_SEARCH_RESULTS = 50;

  const KML_FILES = [
    { label: '0', file: 'kml/0.kml', visible: true },
    { label: '1-1499', file: 'kml/1-1499.kml', visible: false },
    { label: '1500-2999', file: 'kml/1500-2999.kml', visible: false },
    { label: '3000-4499', file: 'kml/3000-4499.kml', visible: false },
    { label: '4500-5999', file: 'kml/4500-5999.kml', visible: false },
    { label: '6000-7499', file: 'kml/6000-7499.kml', visible: false },
    { label: '7500-8999', file: 'kml/7500-8999.kml', visible: false },
    { label: '9000-10499', file: 'kml/9000-10499.kml', visible: false }
  ];

  // אם יש לך אייקון מותאם, בטל את ההערות כאן
  const customIcon = L.icon({
    iconUrl: 'icons/marker.png',
    iconSize: [28, 40],
    iconAnchor: [14, 40],
    popupAnchor: [0, -34]
  });

  const map = L.map('map', {
    preferCanvas: true
  }).setView([31.5, 34.8], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  document.getElementById('mapTitle').textContent = MAP_TITLE;

  const statusEl = document.getElementById('status');
  const searchInput = document.getElementById('searchInput');
  const searchResultsEl = document.getElementById('searchResults');

  const overlays = {};
  const allBounds = [];
  const searchableItems = [];

  let totalMarkers = 0;
  let loadedLayers = 0;

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function extractDriveFileId(url) {
    if (!url) return null;

    let m = url.match(/drive\.google\.com\/file\/d\/([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    m = url.match(/drive\.google\.com\/uc\?[^"' ]*id=([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    m = url.match(/drive\.google\.com\/thumbnail\?[^"' ]*id=([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    m = url.match(/lh3\.googleusercontent\.com\/d\/([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    return null;
  }

  function convertDriveUrl(url) {
    const fileId = extractDriveFileId(url);
    if (!fileId) return url;
    return `https://lh3.googleusercontent.com/d/${fileId}=w1000`;
  }

  function normalizeDescriptionHtml(html) {
    const temp = document.createElement('div');
    temp.innerHTML = html || '';

    const imgs = temp.querySelectorAll('img');
    imgs.forEach((img) => {
      const originalSrc = img.getAttribute('src') || '';
      const newSrc = convertDriveUrl(originalSrc);

      img.setAttribute('src', newSrc);
      img.setAttribute('loading', 'lazy');

      img.onerror = function () {
        const err = document.createElement('div');
        err.className = 'popup-image-error';
        err.textContent = 'התמונה לא נטענה';
        this.insertAdjacentElement('afterend', err);
        this.style.display = 'none';
      };
    });

    const links = temp.querySelectorAll('a');
    links.forEach((a) => {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });

    return temp.innerHTML;
  }

  function stripHtml(html) {
    const div = document.createElement('div');
    div.innerHTML = html || '';
    return (div.textContent || div.innerText || '').trim();
  }

  function getFirstTagText(parent, tagName) {
    const node = parent.getElementsByTagName(tagName)[0];
    return node ? node.textContent.trim() : '';
  }

  function parseCoordinates(coordText) {
    if (!coordText) return null;

    const cleaned = coordText.trim().replace(/\s+/g, ' ');
    const firstCoord = cleaned.split(' ')[0];
    const parts = firstCoord.split(',');

    if (parts.length < 2) return null;

    const lon = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);

    if (Number.isNaN(lat) || Number.isNaN(lon)) return null;

    return { lat, lon };
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  function ensureLayerVisible(layerName) {
    const layer = overlays[layerName];
    if (layer && !map.hasLayer(layer)) {
      layer.addTo(map);
    }
  }

  function renderSearchResults(items) {
    if (!items.length) {
      searchResultsEl.innerHTML = '<div class="search-result-sub">לא נמצאו תוצאות</div>';
      return;
    }

    searchResultsEl.innerHTML = '';

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'search-result-item';

      row.innerHTML = `
        <div class="search-result-title">${escapeHtml(item.name || 'ללא שם')}</div>
        <div class="search-result-sub">${escapeHtml(item.layerLabel)}</div>
        <div class="search-result-sub">${escapeHtml(item.searchText.slice(0, 180))}</div>
      `;

      row.addEventListener('click', () => {
        ensureLayerVisible(item.layerLabel);
        map.setView([item.lat, item.lon], DEFAULT_ZOOM_ON_SEARCH);
        item.marker.openPopup();
      });

      searchResultsEl.appendChild(row);
    });
  }

  function doSearch() {
    const q = searchInput.value.trim().toLowerCase();

    if (!q) {
      searchResultsEl.innerHTML = '';
      return;
    }

    const results = searchableItems
      .filter(item => item.searchTextLower.includes(q))
      .slice(0, MAX_SEARCH_RESULTS);

    renderSearchResults(results);
  }

  async function loadKmlLayer(filePath, layerLabel) {
    const response = await fetch(filePath);
    if (!response.ok) {
      throw new Error(`Failed to load ${filePath} (HTTP ${response.status})`);
    }

    const kmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(kmlText, 'application/xml');

    const parseError = xml.getElementsByTagName('parsererror');
    if (parseError.length > 0) {
      throw new Error(`XML parse error in ${filePath}`);
    }

    const placemarks = xml.getElementsByTagName('Placemark');
    const layerGroup = L.layerGroup();
    const layerBounds = [];
    let markerCount = 0;

    for (let i = 0; i < placemarks.length; i++) {
      const placemark = placemarks[i];

      const name = getFirstTagText(placemark, 'name') || 'ללא שם';
      const descriptionRaw = getFirstTagText(placemark, 'description');
      const coordinates = getFirstTagText(placemark, 'coordinates');

      const coord = parseCoordinates(coordinates);
      if (!coord) continue;

      const descriptionHtml = normalizeDescriptionHtml(descriptionRaw);
      const descriptionText = stripHtml(descriptionHtml);

      const popupHtml = `
        <div class="popup-wrap">
          <div class="popup-title">${escapeHtml(name)}</div>
          <div class="popup-body">${descriptionHtml}</div>
        </div>
      `;

      const marker = L.marker([coord.lat, coord.lon], { icon: customIcon });
      marker.bindPopup(popupHtml, {
        maxWidth: 360,
        minWidth: 300
      });

      layerGroup.addLayer(marker);
      layerBounds.push([coord.lat, coord.lon]);
      allBounds.push([coord.lat, coord.lon]);
      markerCount++;

      const searchText = `${name} ${descriptionText} ${layerLabel}`;
      searchableItems.push({
        name,
        layerLabel,
        lat: coord.lat,
        lon: coord.lon,
        marker,
        searchText,
        searchTextLower: searchText.toLowerCase()
      });
    }

    return {
      layer: layerGroup,
      count: markerCount,
      bounds: layerBounds,
      label: layerLabel
    };
  }

  async function initMap() {
    try {
      const results = await Promise.allSettled(
        KML_FILES.map(item => loadKmlLayer(item.file, item.label))
      );

      let statusLines = [];

      results.forEach((result, index) => {
        const item = KML_FILES[index];

        if (result.status === 'fulfilled') {
          const layerInfo = result.value;

          overlays[item.label] = layerInfo.layer;

          if (item.visible) {
            layerInfo.layer.addTo(map);
          }

          totalMarkers += layerInfo.count;
          loadedLayers++;

          statusLines.push(`${item.label}: ${layerInfo.count} נקודות`);
        } else {
          statusLines.push(`${item.label}: שגיאה`);
          console.error(`Layer load failed: ${item.file}`, result.reason);
        }
      });

      L.control.layers(null, overlays, {
        collapsed: false
      }).addTo(map);

      if (allBounds.length > 0) {
        map.fitBounds(allBounds, { padding: [20, 20] });
      }

      setStatus(
        `נטענו ${loadedLayers} שכבות\n` +
        `סה"כ ${totalMarkers} נקודות\n\n` +
        statusLines.join('\n')
      );
    } catch (err) {
      console.error(err);
      setStatus('שגיאה כללית בטעינת השכבות');
      alert('שגיאה בטעינת השכבות: ' + err.message);
    }
  }

  searchInput.addEventListener('input', doSearch);

  initMap();
</script>

</body>
</html>
