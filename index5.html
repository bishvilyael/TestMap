<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Leaflet KML Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 280px;
      max-width: 340px;
      direction: rtl;
      text-align: right;
      line-height: 1.4;
      font-size: 14px;
    }

    .popup-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .popup-body img {
      display: block;
      max-width: 100%;
      max-height: 260px;
      width: auto;
      height: auto;
      object-fit: contain;
      margin: 8px auto;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    .popup-body a {
      word-break: break-word;
    }

    .popup-image-error {
      color: #b00020;
      font-size: 12px;
      margin-top: 6px;
      text-align: center;
    }

    .status-box {
      position: absolute;
      z-index: 1000;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.95);
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="status" class="status-box">טוען קובץ KML...</div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  const KML_FILE = '260301-260301.kml';

  const map = L.map('map', {
    preferCanvas: true
  }).setView([31.5, 34.8], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const statusEl = document.getElementById('status');

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function extractDriveFileId(url) {
    if (!url) return null;

    let m = url.match(/drive\.google\.com\/file\/d\/([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    m = url.match(/drive\.google\.com\/uc\?[^"' ]*id=([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    m = url.match(/drive\.google\.com\/thumbnail\?[^"' ]*id=([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    m = url.match(/lh3\.googleusercontent\.com\/d\/([A-Za-z0-9_-]+)/i);
    if (m) return m[1];

    return null;
  }

  function convertDriveUrl(url) {
    const fileId = extractDriveFileId(url);
    if (!fileId) return url;
    return `https://lh3.googleusercontent.com/d/${fileId}=w1000`;
  }

  function normalizeDescriptionHtml(html) {
    const temp = document.createElement('div');
    temp.innerHTML = html || '';

    const imgs = temp.querySelectorAll('img');

    imgs.forEach((img) => {
      const originalSrc = img.getAttribute('src') || '';
      const newSrc = convertDriveUrl(originalSrc);

      img.setAttribute('src', newSrc);
      img.setAttribute('loading', 'lazy');

      img.onerror = function () {
        const err = document.createElement('div');
        err.className = 'popup-image-error';
        err.textContent = 'התמונה לא נטענה';
        this.insertAdjacentElement('afterend', err);
        this.style.display = 'none';
      };
    });

    const links = temp.querySelectorAll('a');
    links.forEach((a) => {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });

    return temp.innerHTML;
  }

  function parseCoordinates(coordText) {
    if (!coordText) return null;

    const cleaned = coordText.trim().replace(/\s+/g, ' ');
    const firstCoord = cleaned.split(' ')[0];
    const parts = firstCoord.split(',');

    if (parts.length < 2) return null;

    const lon = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);

    if (Number.isNaN(lat) || Number.isNaN(lon)) return null;

    return { lat, lon };
  }

  function getNodeText(parent, tagName) {
    const node = parent.getElementsByTagName(tagName)[0];
    return node ? node.textContent.trim() : '';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  async function loadKml() {
    try {
      const response = await fetch(KML_FILE);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const kmlText = await response.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(kmlText, 'application/xml');

      const parseError = xml.getElementsByTagName('parsererror');
      if (parseError.length > 0) {
        throw new Error('XML parse error');
      }

      const placemarks = xml.getElementsByTagName('Placemark');
      const bounds = [];
      let addedCount = 0;

      for (let i = 0; i < placemarks.length; i++) {
        const placemark = placemarks[i];

        const name = getNodeText(placemark, 'name') || 'ללא שם';
        const descriptionRaw = getNodeText(placemark, 'description');
        const coordinatesRaw = getNodeText(placemark, 'coordinates');

        const coord = parseCoordinates(coordinatesRaw);
        if (!coord) continue;

        const descriptionHtml = normalizeDescriptionHtml(descriptionRaw);

        const popupHtml = `
          <div class="popup-wrap">
            <div class="popup-title">${escapeHtml(name)}</div>
            <div class="popup-body">${descriptionHtml}</div>
          </div>
        `;

        const marker = L.marker([coord.lat, coord.lon]).addTo(map);
        marker.bindPopup(popupHtml, {
          maxWidth: 360,
          minWidth: 300
        });

        bounds.push([coord.lat, coord.lon]);
        addedCount++;
      }

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [20, 20] });
      }

      setStatus(`נטענו ${addedCount} נקודות מתוך ${placemarks.length}`);
    } catch (err) {
      console.error('Failed loading KML:', err);
      setStatus('שגיאה בטעינת הקובץ');
      alert('Failed to load KML file: ' + err.message);
    }
  }

  loadKml();
</script>

</body>
</html>
